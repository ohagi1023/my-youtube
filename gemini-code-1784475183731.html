<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My YouTube Feed - v6 自動学習版</title>
    <!-- Google Identity Services SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0f0f; color: #f1f1f1; }
        .video-card { transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- ヘッダー -->
        <header class="flex justify-between items-center border-b border-zinc-800 pb-4 mb-6">
            <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2">
                <span class="text-red-500">📺</span> カスタムフィード <span class="text-xs bg-zinc-800 px-2 py-1 rounded text-violet-400 font-normal">v6 自動学習版</span>
            </h1>
            <div class="flex gap-2">
                <button id="login-btn" onclick="handleAuthClick()" class="bg-red-600 hover:bg-red-700 text-sm px-4 py-2 rounded-full font-bold transition">
                    Googleログイン
                </button>
                <button id="logout-btn" onclick="handleSignoutClick()" class="bg-zinc-800 hover:bg-zinc-700 text-sm px-4 py-2 rounded-full font-medium transition" style="display: none;">
                    ログアウト
                </button>
            </div>
        </header>

        <!-- ログイン前画面 -->
        <div id="welcome-content" class="text-center my-20 p-8 bg-zinc-900 rounded-2xl border border-zinc-800 max-w-lg mx-auto">
            <h2 class="text-xl font-bold mb-3">あなた専用のYouTube特化フィード</h2>
            <p class="text-zinc-400 text-sm mb-6 leading-relaxed">
                ログインすると、登録チャンネルから最新動画を自動取得。さらに、あなたがよく見るチャンネルを自動で学習し、最優先で表示します。
            </p>
            <button onclick="handleAuthClick()" class="bg-red-600 hover:bg-red-700 text-base px-6 py-3 rounded-full font-bold transition shadow-lg">
                連携を開始する
            </button>
        </div>

        <!-- ログイン後メインコンテンツ -->
        <div id="main-content" class="hidden">
            <!-- 検索＆更新バー -->
            <div class="flex flex-col sm:flex-row gap-3 mb-8">
                <input type="text" id="filter-search" oninput="filterVideos()" class="bg-zinc-900 border border-zinc-800 text-zinc-100 px-4 py-2 rounded-xl flex-grow text-sm focus:outline-none focus:border-zinc-600" placeholder="タイトルやチャンネル名でリアルタイム絞り込み...">
                <button onclick="refreshFeed()" class="bg-zinc-800 hover:bg-zinc-700 text-sm px-5 py-2 rounded-xl font-medium transition flex items-center justify-center gap-1">
                    🔄 フィードを更新
                </button>
            </div>

            <!-- 状態表示 -->
            <div id="status" class="text-center my-12 text-zinc-400 font-medium">
                動画を読み込んでいます...
            </div>

            <!-- ─── 🔴 配信中のライブ ─── -->
            <div id="live-section" class="mb-12 hidden">
                <h2 class="text-lg font-bold text-red-500 flex items-center gap-2 mb-4">
                    <span class="animate-pulse bg-red-500 w-2.5 h-2.5 rounded-full inline-block"></span> 🔴 配信中のライブ
                </h2>
                <div id="live-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
            </div>

            <!-- ─── 🔥 よく見るチャンネル（自動選考） ─── -->
            <div id="frequent-section" class="mb-12 hidden">
                <h2 class="text-lg font-bold text-xl text-transparent bg-clip-text bg-gradient-to-r from-violet-400 to-fuchsia-400 flex items-center gap-2 mb-4">
                    🔥 よく見るチャンネルの新着（自動学習）
                </h2>
                <div id="frequent-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
            </div>

            <!-- ─── 📱 Shorts（3分以内） ─── -->
            <div id="shorts-section" class="mb-12 hidden">
                <h2 class="text-lg font-bold text-red-400 flex items-center gap-2 mb-4">
                    📱 Shorts（3分以内・よく見る順）
                </h2>
                <div id="shorts-grid" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-4"></div>
            </div>

            <!-- ─── ✨ 本日の動画（24時間以内） ─── -->
            <div id="today-section" class="mb-12 hidden">
                <h2 class="text-lg font-bold text-amber-400 flex items-center gap-2 mb-4">
                    ✨ 本日の動画（24時間以内）
                </h2>
                <div id="today-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
            </div>

            <!-- ─── 📅 最近の動画（24時間～3日前） ─── -->
            <div id="recent-section" class="mb-12 hidden">
                <h2 class="text-lg font-bold text-zinc-300 flex items-center gap-2 mb-4">
                    📅 最近の動画（3日以内）
                </h2>
                <div id="recent-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
            </div>

            <!-- ─── ✅ 視聴済みの動画・ライブ ─── -->
            <div id="watched-section" class="mb-12 border-t border-zinc-800 pt-8 hidden">
                <h2 class="text-lg font-bold text-zinc-500 flex items-center gap-2 mb-4">
                    ✅ 視聴済みの動画・ライブ
                </h2>
                <div id="watched-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
            </div>

            <!-- ─── 🎉 空っぽの時の表示 ─── -->
            <div id="empty-message" class="text-center my-20 text-zinc-500 hidden">
                <p class="text-3xl mb-2">✨</p>
                <p class="font-medium">対象の動画や配信はありません！</p>
            </div>
        </div>

        <!-- フッター -->
        <footer class="mt-20 pt-8 border-t border-zinc-800 flex flex-col sm:flex-row justify-center gap-4 sm:gap-8 text-center">
            <button onclick="resetViewedList()" class="text-xs text-zinc-600 hover:text-red-400 underline transition">
                すべての動画を「未視聴」に戻す
            </button>
            <button onclick="resetClicksList()" class="text-xs text-zinc-600 hover:text-violet-400 underline transition">
                チャンネルの「よく見る学習履歴」をリセットする
            </button>
        </footer>
    </div>

    <script>
        const CLIENT_ID = '617132904694-v3buugv4jh6pjp9bntcn08q8ekl8ciu5.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/youtube.readonly';

        let tokenClient;
        let accessToken = null;
        let allVideosMaster = []; 
        let viewedVideoIds = new Set(JSON.parse(localStorage.getItem('viewed_video_ids') || '[]'));

        function initTokenClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        accessToken = tokenResponse.access_token;
                        sessionStorage.setItem('yt_oauth_token', accessToken);
                        showUi(true);
                        refreshFeed();
                    }
                },
            });
        }

        window.onload = function() {
            initTokenClient();
            const savedToken = sessionStorage.getItem('yt_oauth_token');
            if (savedToken) {
                accessToken = savedToken;
                showUi(true);
                refreshFeed();
            } else {
                showUi(false);
            }
        };

        function handleAuthClick() { tokenClient.requestAccessToken({ prompt: 'select_account' }); }
        function handleSignoutClick() {
            if (accessToken) {
                google.accounts.oauth2.revokeToken(accessToken, () => {
                    accessToken = null;
                    sessionStorage.removeItem('yt_oauth_token');
                    allVideosMaster = [];
                    showUi(false);
                });
            }
        }

        function showUi(isLoggedIn) {
            document.getElementById('login-btn').style.display = isLoggedIn ? 'none' : 'block';
            document.getElementById('logout-btn').style.display = isLoggedIn ? 'block' : 'none';
            document.getElementById('main-content').style.display = isLoggedIn ? 'block' : 'none';
            document.getElementById('welcome-content').style.display = isLoggedIn ? 'none' : 'block';
        }

        async function refreshFeed() {
            const statusEl = document.getElementById('status');
            statusEl.style.display = 'block';
            statusEl.innerText = '登録チャンネルを取得中...';
            clearAllGrids();

            try {
                const subUrl = `https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=50`;
                const subRes = await fetch(subUrl, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                if (subRes.status === 401) { handleSignoutClick(); return; }
                const subData = await subRes.json();
                if (!subData.items) { statusEl.innerText = 'チャンネルが見つかりません。'; return; }

                statusEl.innerText = '新着動画のIDを解析中...';
                
                let allVideoIds = [];
                const fetchPromises = subData.items.map(async (item) => {
                    const channelId = item.snippet.resourceId.channelId;
                    const uploadPlaylistId = 'UU' + channelId.substring(2);
                    const playlistUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadPlaylistId}&maxResults=3`;
                    try {
                        const res = await fetch(playlistUrl, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                        const data = await res.json();
                        return data.items ? data.items.map(i => i.snippet.resourceId.videoId) : [];
                    } catch (e) { return []; }
                });

                const idResults = await Promise.all(fetchPromises);
                idResults.forEach(ids => { allVideoIds = allVideoIds.concat(ids); });

                statusEl.innerText = '動画の配信ステータスと長さを一括検証中...';
                allVideosMaster = await fetchVideoDetails(allVideoIds);
                
                statusEl.style.display = 'none';
                processAndRender(allVideosMaster);

            } catch (err) {
                console.error(err);
                statusEl.innerText = 'エラーが発生しました。再読み込みしてください。';
            }
        }

        async function fetchVideoDetails(videoIds) {
            if (videoIds.length === 0) return [];
            let details = [];
            for (let i = 0; i < videoIds.length; i += 50) {
                const chunk = videoIds.slice(i, i + 50);
                const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails&id=${chunk.join(',')}`;
                try {
                    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                    const data = await res.json();
                    if (data.items) {
                        const mapped = data.items.map(item => ({
                            id: item.id,
                            title: item.snippet.title,
                            thumbnail: item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || '',
                            channelTitle: item.snippet.channelTitle,
                            publishedAt: new Date(item.snippet.publishedAt),
                            liveStatus: item.snippet.liveBroadcastContent, 
                            duration: item.contentDetails?.duration || '',
                            url: `https://www.youtube.com/watch?v=${item.id}`
                        }));
                        details = details.concat(mapped);
                    }
                } catch (e) { console.error(e); }
            }
            return details;
        }

        // ISO 8601形式の時間を総秒数に変換する計算機
        function parseDurationToSeconds(duration) {
            if (!duration) return 0;
            const matches = duration.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
            if (!matches) return 0;
            const hours = parseInt(matches[1] || 0, 10);
            const minutes = parseInt(matches[2] || 0, 10);
            const seconds = parseInt(matches[3] || 0, 10);
            return (hours * 3600) + (minutes * 60) + seconds;
        }

        // 新・Shorts判定（3分＝180秒以内ならShortsとみなす）
        function isShorts(duration) {
            const totalSeconds = parseDurationToSeconds(duration);
            return totalSeconds > 0 && totalSeconds <= 180;
        }

        function processAndRender(videos) {
            clearAllGrids();

            const now = new Date();
            const oneDayAgo = new Date(now.getTime() - 24 * 60 * 60 * 1000);
            const threeDaysAgo = new Date(now.getTime() - 3 * 24 * 60 * 60 * 1000);

            const validVideos = videos.filter(v => v.liveStatus === 'live' || (v.liveStatus !== 'upcoming' && v.publishedAt >= threeDaysAgo));

            const unviewed = validVideos.filter(v => !viewedVideoIds.has(v.id));
            const watched = validVideos.filter(v => viewedVideoIds.has(v.id));

            // 自動学習：クリック履歴から「2回以上クリックされたチャンネル」をよく見るチャンネルと選考
            const clicks = JSON.parse(localStorage.getItem('channel_clicks') || '{}');
            const frequentChannels = Object.keys(clicks).filter(title => clicks[title] >= 2);

            // 1. ライブ配信
            const liveList = unviewed.filter(v => v.liveStatus === 'live');
            const nonLiveUnviewed = unviewed.filter(v => v.liveStatus !== 'live');

            // 2. Shorts（3分以内）
            // よく見るチャンネルのShortsが左上に最優先で並ぶようにカスタムソート
            const shortsList = nonLiveUnviewed.filter(v => isShorts(v.duration)).sort((a, b) => {
                const aFav = frequentChannels.includes(a.channelTitle) ? 1 : 0;
                const bFav = frequentChannels.includes(b.channelTitle) ? 1 : 0;
                if (aFav !== bFav) return bFav - aFav; 
                return b.publishedAt - a.publishedAt; 
            });

            // 通常の動画（3分を超えるもの）
            const normalList = nonLiveUnviewed.filter(v => !isShorts(v.duration));

            // 3. 【新設】よく見るチャンネルの通常動画
            const frequentList = normalList.filter(v => frequentChannels.includes(v.channelTitle)).sort((a,b)=>b.publishedAt-a.publishedAt);
            
            // それ以外のチャンネルの通常動画
            const remainingNormal = normalList.filter(v => !frequentChannels.includes(v.channelTitle));

            // 4. 本日の動画 / 最近の動画
            const todayList = remainingNormal.filter(v => v.publishedAt >= oneDayAgo).sort((a,b)=>b.publishedAt-a.publishedAt);
            const recentList = remainingNormal.filter(v => v.publishedAt < oneDayAgo).sort((a,b)=>b.publishedAt-a.publishedAt);
            
            // 5. 視聴済み
            const watchedList = watched.sort((a,b)=>b.publishedAt-a.publishedAt);

            // 描画
            renderSection('live', liveList, true, false);
            renderSection('frequent', frequentList, false, false);
            renderSection('shorts', shortsList, false, false, true);
            renderSection('today', todayList, false, false);
            renderSection('recent', recentList, false, false);
            renderSection('watched', watchedList, false, true);

            if (validVideos.length === 0) {
                document.getElementById('empty-message').classList.remove('hidden');
            } else {
                document.getElementById('empty-message').classList.add('hidden');
            }
        }

        function renderSection(prefix, list, isLive, isWatched, isShortsGrid = false) {
            const grid = document.getElementById(`${prefix}-grid`);
            const section = document.getElementById(`${prefix}-section`);
            
            if (list.length === 0) {
                section.classList.add('hidden');
                return;
            }
            section.classList.remove('hidden');
            list.forEach(v => {
                grid.appendChild(createVideoCard(v, isLive || v.liveStatus === 'live', isWatched, isShortsGrid));
            });
        }

        function createVideoCard(video, isLive, isWatched, isShortsGrid) {
            const card = document.createElement('div');
            card.id = `video-${video.id}`;
            
            const aspectClass = isShortsGrid ? 'aspect-[9/16]' : 'aspect-video';
            card.className = `video-card bg-zinc-900 rounded-xl overflow-hidden shadow-lg border border-zinc-800 flex flex-col hover:border-zinc-700 ${isWatched ? 'opacity-30 select-none' : ''}`;
            
            const timeStr = isLive && !isWatched ? '🔴 LIVE配信中' : formatTimeAgo(video.publishedAt);
            const badgeColor = isLive ? 'bg-red-600 text-white' : (isShortsGrid ? 'bg-red-500 text-white' : 'bg-zinc-800 text-zinc-400');
            const badgeText = isLive ? 'LIVE' : (isShortsGrid ? 'Shorts' : '動画');

            card.innerHTML = `
                <a href="${video.url}" target="_blank" onclick="watchVideo('${video.id}')" class="block ${aspectClass} overflow-hidden bg-black group relative">
                    <img src="${video.thumbnail}" alt="${video.title}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                    <span class="absolute bottom-2 right-2 text-[10px] font-bold px-2 py-0.5 rounded ${badgeColor}">
                        ${badgeText}
                    </span>
                </a>
                <div class="p-3 flex flex-col flex-grow">
                    <h3 class="font-bold text-xs line-clamp-2 text-zinc-100 mb-1 leading-snug">${video.title}</h3>
                    <div class="mt-auto text-[11px] text-zinc-400 space-y-0.5">
                        <p class="font-medium text-zinc-300 truncate">${video.channelTitle}</p>
                        <p class="${isLive && !isWatched ? 'text-red-400 font-medium' : ''}">${timeStr}</p>
                    </div>
                </div>
            `;
            return card;
        }

        function watchVideo(videoId) {
            // クリックされたら、その動画のチャンネルのクリックカウントを増やす（自動学習用）
            const video = allVideosMaster.find(v => v.id === videoId);
            if (video && video.channelTitle) {
                let clicks = JSON.parse(localStorage.getItem('channel_clicks') || '{}');
                clicks[video.channelTitle] = (clicks[video.channelTitle] || 0) + 1;
                localStorage.setItem('channel_clicks', JSON.stringify(clicks));
            }

            if (viewedVideoIds.has(videoId)) return;
            viewedVideoIds.add(videoId);
            localStorage.setItem('viewed_video_ids', JSON.stringify([...viewedVideoIds]));
            
            const card = document.getElementById(`video-${videoId}`);
            if (card) {
                card.style.opacity = '0';
                card.style.transform = 'scale(0.9)';
                setTimeout(() => {
                    processAndRender(allVideosMaster);
                }, 300);
            }
        }

        function filterVideos() {
            const query = document.getElementById('filter-search').value.toLowerCase();
            if (!query) { processAndRender(allVideosMaster); return; }

            const filtered = allVideosMaster.filter(video => {
                return video.title.toLowerCase().includes(query) || 
                       video.channelTitle.toLowerCase().includes(query);
            });
            processAndRender(filtered);
        }

        function clearAllGrids() {
            ['live', 'frequent', 'shorts', 'today', 'recent', 'watched'].forEach(p => {
                const grid = document.getElementById(`${p}-grid`);
                if(grid) grid.innerHTML = '';
                const sec = document.getElementById(`${p}-section`);
                if(sec) sec.classList.add('hidden');
            });
        }

        function refreshFeed() { if (accessToken) refreshFeed(); }

        function resetViewedList() {
            if (confirm('すべての動画を未視聴の状態（上段）に戻しますか？')) {
                localStorage.removeItem('viewed_video_ids');
                viewedVideoIds.clear();
                processAndRender(allVideosMaster);
            }
        }

        function resetClicksList() {
            if (confirm('よく見るチャンネルの学習履歴をすべてリセットしますか？')) {
                localStorage.removeItem('channel_clicks');
                processAndRender(allVideosMaster);
            }
        }

        function formatTimeAgo(date) {
            const diffMs = new Date() - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHours / 24);
            if (diffMins < 60) return `${diffMins}分前`;
            if (diffHours < 24) return `${diffHours}時間前`;
            return `${diffDays}日前`;
        }
    </script>
</body>
</html>
