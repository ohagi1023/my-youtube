<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUSTOM FEED</title>
    <!-- Google Identity Services SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #09090b; color: #f4f4f5; font-family: system-ui, -apple-system, sans-serif; }
        
        .scroll-container::-webkit-scrollbar {
            height: 5px;
            width: 4px;
        }
        .scroll-container::-webkit-scrollbar-track {
            background: #18181b;
            border-radius: 10px;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 10px;
        }
        .scroll-container::-webkit-scrollbar-thumb:hover {
            background: #71717a;
        }
        
        .video-card { 
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .video-card:hover { 
            transform: translateY(-4px); 
            border-color: #3f3f46; 
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.8); 
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #2dd4bf;
            cursor: pointer;
        }

        /* ─── サイドバー開閉 ─── */
        #sidebar-aside {
            transition: width 0.25s ease, min-width 0.25s ease, padding 0.25s ease, opacity 0.2s ease, transform 0.3s ease;
        }
        @media (min-width: 768px) {
            body.sidebar-closed #sidebar-aside {
                width: 0;
                min-width: 0;
                padding-left: 0;
                padding-right: 0;
                opacity: 0;
                overflow: hidden;
                border-right-width: 0;
            }
        }
        #sidebar-overlay {
            display: none;
        }
        @media (max-width: 767px) {
            #sidebar-aside {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                z-index: 50;
                width: 84%;
                max-width: 300px;
                transform: translateX(-100%);
                box-shadow: 10px 0 30px rgba(0,0,0,0.6);
            }
            body:not(.sidebar-closed) #sidebar-aside {
                transform: translateX(0);
            }
            body:not(.sidebar-closed) #sidebar-overlay {
                display: block;
            }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col sidebar-closed">

    <!-- ─── サイドバー初期状態の決定（ちらつき防止のため同期実行） ─── -->
    <script>
        (function() {
            var saved = localStorage.getItem('sidebar_open');
            var isDesktop = window.innerWidth >= 768;
            var shouldOpen = saved !== null ? (saved === 'true') : isDesktop;
            if (shouldOpen) document.body.classList.remove('sidebar-closed');
        })();
    </script>

                    <div class="border-t border-zinc-900 pt-4">

    <script>
        const CLIENT_ID = '617132904694-v3buugv4jh6pjp9bntcn08q8ekl8ciu5.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/youtube.readonly';

        let tokenClient;
        let accessToken = null;
        let allVideosMaster = []; 
        let mySubscribedChannels = []; 
        let categoryExtraVideos = { endra: [], vtuber: [], talk_sing: [], clip: [] }; // 各特化フィルター専用チャンネルの動画
        let renderedSectionVideos = {}; // 各セクションの現在の表示内容（まとめて見る機能で参照）
        let viewedVideoIds = new Set(JSON.parse(localStorage.getItem('viewed_video_ids') || '[]'));
        
        let currentFilter = 'all'; 
        let maxDurationMinutes = 0; 
        let authExpired = false;

        // ─── トークン切れ(401)を検知した時の共通処理 ───
        function handleExpiredToken() {
            if (authExpired) return;
            authExpired = true;
            accessToken = null;
            sessionStorage.removeItem('yt_oauth_token');
            showUi(false);
            const statusEl = document.getElementById('status');
            if (statusEl) statusEl.style.display = 'none';
            alert('Googleとの連携の有効期限が切れました。もう一度「Google連携」からログインしてください。');
        }

        const FILTER_KEYWORDS = {
            endra: ['エンドラ', 'endra', '軍艦'],
            vtuber: ['vtuber', 'v tuber', 'にじさんじ', 'ホロライブ', 'ぶいすぽ', 'ネオポルテ', 'あおぎり', 'のりプロ', 'ホロスターズ'],
            talk_sing: ['雑談', '歌枠', 'singing', '歌ってみた', 'mv', 'cover', '弾き語り', 'ライブ音源'],
            clip: ['切り抜き', 'まとめ', '名場面', 'clips']
        };

        // 各特化フィルターにデフォルトで紐づく推しチャンネル（自由に追加・削除可）
        const FILTER_CHANNEL_DEFAULTS = {
            endra: [],
            vtuber: [],
            talk_sing: [],
            clip: [
                'UCoM5tr4Uf8qYDe48IOyMLNw',
                'UCZ_Gm9ipdFovmM8Pf9f-_Ww',
                'UC2bTmb1UK1gv9rAvjiORRuQ',
                'UC0_zoJAoiwQSMFdMjkGatAQ',
                'UCzfEOwQSg1OMcwgtV6u1_kA',
                'UCIOwdHIKvZbkJWabnl-Mb0Q',
                'UCTqaQDh8fiakSnhi0xHeArw',
                'UC04LmK8LzR09018BJ4mDAAw'
            ]
        };

        // ─────────────────────────────────────────────
        // 🗄️ APIキャッシュ層（消費量削減用）
        // ─────────────────────────────────────────────
        const CACHE_TTL_SUBS = 6 * 60 * 60 * 1000;       // 登録チャンネル一覧: 6時間
        const CACHE_TTL_PLAYLIST = 10 * 60 * 1000;       // 各チャンネルの新着ID一覧: 10分
        const CACHE_TTL_VIDEO_LIVE = 5 * 60 * 1000;      // ライブ/配信予定の動画詳細: 5分
        const CACHE_TTL_VIDEO_NORMAL = 12 * 60 * 60 * 1000; // 通常動画の詳細: 12時間

        function safeGetJSON(key, fallback) {
            try { return JSON.parse(localStorage.getItem(key) || 'null') ?? fallback; }
            catch (e) { return fallback; }
        }
        function safeSetJSON(key, val) {
            try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {}
        }

        function getCachedSubscriptions() {
            const cached = safeGetJSON('cache_subscriptions', null);
            if (cached && (Date.now() - cached.ts) < CACHE_TTL_SUBS) return cached.data;
            return null;
        }
        function setCachedSubscriptions(data) {
            safeSetJSON('cache_subscriptions', { ts: Date.now(), data });
        }

        function getCachedPlaylist(channelId) {
            const all = safeGetJSON('cache_playlist_ids', {});
            const entry = all[channelId];
            if (entry && (Date.now() - entry.ts) < CACHE_TTL_PLAYLIST) return entry.ids;
            return null;
        }
        function setCachedPlaylist(channelId, ids) {
            const all = safeGetJSON('cache_playlist_ids', {});
            all[channelId] = { ts: Date.now(), ids };
            safeSetJSON('cache_playlist_ids', all);
        }

        // 動画詳細のキャッシュ（liveStatusによってTTLを切り替える）
        function serializeVideo(v) {
            return {
                ...v,
                publishedAt: v.publishedAt ? v.publishedAt.toISOString() : null,
                scheduledStartTime: v.scheduledStartTime ? v.scheduledStartTime.toISOString() : null,
            };
        }
        function deserializeVideo(v) {
            return {
                ...v,
                publishedAt: v.publishedAt ? new Date(v.publishedAt) : new Date(),
                scheduledStartTime: v.scheduledStartTime ? new Date(v.scheduledStartTime) : null,
            };
        }
        function getCachedVideoDetail(id) {
            const all = safeGetJSON('cache_video_details', {});
            const entry = all[id];
            if (!entry) return null;
            const isLiveLike = entry.data.liveStatus === 'live' || entry.data.liveStatus === 'upcoming';
            const ttl = isLiveLike ? CACHE_TTL_VIDEO_LIVE : CACHE_TTL_VIDEO_NORMAL;
            if ((Date.now() - entry.ts) < ttl) return deserializeVideo(entry.data);
            return null;
        }
        function setCachedVideoDetails(videos) {
            const all = safeGetJSON('cache_video_details', {});
            videos.forEach(v => { all[v.id] = { ts: Date.now(), data: serializeVideo(v) }; });
            safeSetJSON('cache_video_details', all);
        }

        function resetCacheAndRefresh() {
            if (confirm('APIキャッシュをすべて削除して、最新の状態を強制的に取得し直しますか？')) {
                ['cache_subscriptions', 'cache_playlist_ids', 'cache_video_details'].forEach(k => localStorage.removeItem(k));
                refreshFeed();
            }
        }

        // ─────────────────────────────────────────────
        // 🔑 チャンネルID直接追加（フィルターカテゴリごと）
        // ─────────────────────────────────────────────
        const FILTER_CATEGORIES = ['endra', 'vtuber', 'talk_sing', 'clip'];

        function getCustomFilterChannels(category) {
            const all = safeGetJSON('custom_filter_channels', {});
            return all[category] || [];
        }
        function getFilterChannels(category) {
            return [...new Set([...(FILTER_CHANNEL_DEFAULTS[category] || []), ...getCustomFilterChannels(category)])];
        }
        function toggleFilterChannelInput(category) {
            const row = document.getElementById(`filter-channel-row-${category}`);
            if (!row) return;
            const isHidden = row.classList.contains('hidden');
            if (isHidden) {
                row.classList.remove('hidden');
                document.getElementById(`filter-channel-input-${category}`).focus();
            } else {
                row.classList.add('hidden');
            }
        }
        function addFilterChannel(category) {
            const input = document.getElementById(`filter-channel-input-${category}`);
            const raw = input.value.trim();
            if (!raw) return;

            // UCから始まるIDだけでなく、チャンネルURLを貼っても拾えるようにする
            const match = raw.match(/(UC[0-9A-Za-z_-]{22})/);
            const channelId = match ? match[1] : raw;

            if (!/^UC[0-9A-Za-z_-]{22}$/.test(channelId)) {
                alert('チャンネルIDの形式が正しくありません。\n「UC」から始まる24文字のIDを入力するか、チャンネルURLを貼り付けてください。');
                return;
            }

            const all = safeGetJSON('custom_filter_channels', {});
            if (!all[category]) all[category] = [];
            const defaults = FILTER_CHANNEL_DEFAULTS[category] || [];
            if (defaults.includes(channelId) || all[category].includes(channelId)) {
                alert('すでに登録済みのチャンネルIDです。');
                return;
            }
            all[category].push(channelId);
            safeSetJSON('custom_filter_channels', all);
            input.value = '';
            document.getElementById(`filter-channel-row-${category}`).classList.add('hidden');
            renderFilterChannelChips(category);
            fetchCategoryExtraVideos(category);
        }
        function removeFilterChannel(category, channelId) {
            const all = safeGetJSON('custom_filter_channels', {});
            if (!all[category]) return;
            all[category] = all[category].filter(id => id !== channelId);
            safeSetJSON('custom_filter_channels', all);
            renderFilterChannelChips(category);
            fetchCategoryExtraVideos(category);
        }
        function renderFilterChannelChips(category) {
            const wrap = document.getElementById(`filter-channel-chips-${category}`);
            if (!wrap) return;
            const custom = getCustomFilterChannels(category);
            wrap.innerHTML = '';
            custom.forEach(id => {
                const chip = document.createElement('span');
                chip.className = 'inline-flex items-center gap-1 bg-zinc-900 border border-zinc-800 text-zinc-400 text-[9px] pl-2 pr-1 py-1 rounded-full';
                chip.innerHTML = `<span class="font-mono">${id.slice(0, 10)}…</span>`;
                const btn = document.createElement('button');
                btn.textContent = '×';
                btn.title = '削除';
                btn.className = 'text-zinc-600 hover:text-red-400 px-1 leading-none';
                btn.onclick = () => removeFilterChannel(category, id);
                chip.appendChild(btn);
                wrap.appendChild(chip);
            });
        }
        function renderAllFilterChannelChips() {
            FILTER_CATEGORIES.forEach(renderFilterChannelChips);
        }

        // 特定カテゴリ専用チャンネルの最新動画を取得し、そのフィルターが選択中なら再描画
        async function fetchCategoryExtraVideos(category) {
            const channels = getFilterChannels(category);
            if (channels.length === 0) {
                categoryExtraVideos[category] = [];
                if (currentFilter === category) processAndRender(allVideosMaster);
                return;
            }

            let videoIds = [];
            try {
                const promises = channels.map(async (chId) => {
                    const cachedIds = getCachedPlaylist(chId);
                    if (cachedIds) return cachedIds;
                    const uploadPlaylistId = 'UU' + chId.substring(2);
                    const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadPlaylistId}&maxResults=5`;
                    try {
                        const res = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                        if (res.status === 401) { handleExpiredToken(); return []; }
                        const data = await res.json();
                        const ids = data.items ? data.items.map(i => i.snippet?.resourceId?.videoId).filter(Boolean) : [];
                        setCachedPlaylist(chId, ids);
                        return ids;
                    } catch (e) { return []; }
                });

                const results = await Promise.all(promises);
                if (authExpired) return;
                results.forEach(ids => { videoIds = videoIds.concat(ids); });

                if (videoIds.length === 0) {
                    categoryExtraVideos[category] = [];
                    if (currentFilter === category) processAndRender(allVideosMaster);
                    return;
                }

                const videos = await fetchVideoDetails(videoIds);
                if (authExpired) return;
                categoryExtraVideos[category] = videos;
                if (currentFilter === category) processAndRender(allVideosMaster);
            } catch (err) {
                console.error(`Category extra fetch error (${category}):`, err);
            }
        }
        async function fetchAllCategoryExtraVideos() {
            await Promise.all(FILTER_CATEGORIES.map(cat => fetchCategoryExtraVideos(cat)));
        }

        function initTokenClient() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        accessToken = tokenResponse.access_token;
                        authExpired = false;
                        sessionStorage.setItem('yt_oauth_token', accessToken);
                        showUi(true);
                        refreshFeed();
                    }
                },
            });
        }

        window.onload = function() {
            initTokenClient();
            renderAllFilterChannelChips();
            const savedToken = sessionStorage.getItem('yt_oauth_token');
            if (savedToken) {
                accessToken = savedToken;
                showUi(true);
                refreshFeed();
            } else {
                showUi(false);
            }
        };

        function handleAuthClick() { tokenClient.requestAccessToken({ prompt: 'select_account' }); }
        function handleSignoutClick() {
            if (accessToken) {
                google.accounts.oauth2.revokeToken(accessToken, () => {
                    accessToken = null;
                    sessionStorage.removeItem('yt_oauth_token');
                    allVideosMaster = [];
                    mySubscribedChannels = [];
                    showUi(false);
                });
            }
        }

        function showUi(isLoggedIn) {
            document.getElementById('login-btn').style.display = isLoggedIn ? 'none' : 'block';
            document.getElementById('logout-btn').style.display = isLoggedIn ? 'block' : 'none';
            document.getElementById('main-content').style.display = isLoggedIn ? 'block' : 'none';
            document.getElementById('welcome-content').style.display = isLoggedIn ? 'none' : 'block';
            document.getElementById('sidebar-menu').style.display = isLoggedIn ? 'flex' : 'none';
            document.getElementById('admin-footer').style.display = isLoggedIn ? 'flex' : 'none';
        }

        // ─────────────────────────────────────────────
        // 📂 サイドバーの開閉
        // ─────────────────────────────────────────────
        function isMobileViewport() {
            return window.innerWidth < 768;
        }
        function openSidebar() {
            document.body.classList.remove('sidebar-closed');
            localStorage.setItem('sidebar_open', 'true');
        }
        function closeSidebar() {
            document.body.classList.add('sidebar-closed');
            localStorage.setItem('sidebar_open', 'false');
        }
        function toggleSidebar() {
            if (document.body.classList.contains('sidebar-closed')) {
                openSidebar();
            } else {
                closeSidebar();
            }
        }

        async function refreshFeed() {
            const statusEl = document.getElementById('status');
            statusEl.style.display = 'block';
            statusEl.innerText = '登録チャンネルを取得中...';
            clearAllGrids();

            try {
                // ─── 登録チャンネル一覧: キャッシュがあれば使い回してAPIコールを節約 ───
                let subItems = getCachedSubscriptions();
                if (!subItems) {
                    const subUrl = `https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=50`;
                    const subRes = await fetch(subUrl, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                    if (subRes.status === 401) { handleExpiredToken(); return; }
                    const subData = await subRes.json();
                    if (!subData.items) { statusEl.innerText = 'チャンネルが見つかりません。'; return; }
                    subItems = subData.items;
                    setCachedSubscriptions(subItems);
                }

                mySubscribedChannels = subItems.map(item => item.snippet?.title ? item.snippet.title.toLowerCase() : '');

                statusEl.innerText = '新着動画を解析中...';
                
                let allVideoIds = [];
                const fetchPromises = subItems.map(async (item) => {
                    const channelId = item.snippet.resourceId.channelId;

                    // ─── 各チャンネルの新着動画ID一覧: 短時間キャッシュで連続更新のコストを削減 ───
                    const cachedIds = getCachedPlaylist(channelId);
                    if (cachedIds) return cachedIds;

                    const uploadPlaylistId = 'UU' + channelId.substring(2);
                    const playlistUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadPlaylistId}&maxResults=3`;
                    try {
                        const res = await fetch(playlistUrl, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                        if (res.status === 401) { handleExpiredToken(); return []; }
                        const data = await res.json();
                        const ids = data.items ? data.items.map(i => i.snippet.resourceId.videoId) : [];
                        setCachedPlaylist(channelId, ids);
                        return ids;
                    } catch (e) { return []; }
                });

                const idResults = await Promise.all(fetchPromises);
                if (authExpired) return;
                idResults.forEach(ids => { allVideoIds = allVideoIds.concat(ids); });

                const pinnedIds = JSON.parse(localStorage.getItem('pinned_video_ids') || '[]');
                allVideoIds = [...new Set([...allVideoIds, ...pinnedIds])];

                statusEl.innerText = 'フィードを構築中...';
                allVideosMaster = await fetchVideoDetails(allVideoIds);
                if (authExpired) return;
                
                statusEl.style.display = 'none';
                processAndRender(allVideosMaster);

                // ─── メイン描画が終わってから、各特化フィルター専用チャンネルの動画を取得 ───
                await fetchAllCategoryExtraVideos();

            } catch (err) {
                console.error(err);
                statusEl.innerText = 'エラーが発生しました。再読み込みしてください。';
            }
        }

        async function fetchVideoDetails(videoIds) {
            if (!videoIds || videoIds.length === 0) return [];
            const uniqueIds = [...new Set(videoIds)];

            // ─── まずキャッシュ済みの動画詳細を再利用し、未取得/期限切れ分だけAPIを叩く ───
            const resultMap = new Map();
            const idsToFetch = [];
            uniqueIds.forEach(id => {
                const cached = getCachedVideoDetail(id);
                if (cached) {
                    resultMap.set(id, cached);
                } else {
                    idsToFetch.push(id);
                }
            });

            for (let i = 0; i < idsToFetch.length; i += 50) {
                const chunk = idsToFetch.slice(i, i + 50);
                const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,liveStreamingDetails&id=${chunk.join(',')}`;
                try {
                    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                    if (res.status === 401) { handleExpiredToken(); break; }
                    const data = await res.json();
                    if (data.items) {
                        const mapped = data.items.map(item => ({
                            id: item.id,
                            title: item.snippet?.title || '',
                            thumbnail: item.snippet?.thumbnails?.medium?.url || item.snippet?.thumbnails?.default?.url || '',
                            channelTitle: item.snippet?.channelTitle || '',
                            publishedAt: item.snippet?.publishedAt ? new Date(item.snippet.publishedAt) : new Date(),
                            liveStatus: item.snippet?.liveBroadcastContent || 'none', 
                            duration: item.contentDetails?.duration || '',
                            scheduledStartTime: item.liveStreamingDetails?.scheduledStartTime ? new Date(item.liveStreamingDetails.scheduledStartTime) : null,
                            url: `https://www.youtube.com/watch?v=${item.id}`
                        }));
                        mapped.forEach(v => resultMap.set(v.id, v));
                        setCachedVideoDetails(mapped);
                    }
                } catch (e) { console.error(e); }
            }

            // 元の順序を維持して返す
            return uniqueIds.map(id => resultMap.get(id)).filter(Boolean);
        }

        function parseDurationToSeconds(duration) {
            if (!duration) return 0;
            const matches = duration.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
            if (!matches) return 0;
            const hours = parseInt(matches[1] || 0, 10);
            const minutes = parseInt(matches[2] || 0, 10);
            const seconds = parseInt(matches[3] || 0, 10);
            return (hours * 3600) + (minutes * 60) + seconds;
        }

        function isShorts(duration) {
            const totalSeconds = parseDurationToSeconds(duration);
            return totalSeconds > 0 && totalSeconds <= 180;
        }

        function changeFilter(filterType) {
            currentFilter = filterType;
            ['endra', 'vtuber', 'talk_sing', 'clip'].forEach(f => {
                const btn = document.getElementById(`btn-filter-${f}`);
                if (!btn) return;
                if (f === filterType) {
                    btn.className = "flex-grow text-left text-xs px-3 py-1.5 rounded-lg bg-zinc-900 text-teal-400 font-bold transition flex items-center gap-1.5";
                } else {
                    btn.className = "flex-grow text-left text-xs px-3 py-1.5 rounded-lg text-zinc-400 hover:text-zinc-200 hover:bg-zinc-900/50 transition flex items-center gap-1.5";
                }
            });
            const allBtn = document.getElementById('btn-filter-all');
            if (allBtn) {
                allBtn.className = filterType === 'all'
                    ? "w-full text-left text-xs px-3 py-2 rounded-lg bg-zinc-900 text-zinc-100 font-semibold transition"
                    : "w-full text-left text-xs px-3 py-2 rounded-lg text-zinc-400 hover:text-zinc-200 hover:bg-zinc-900/50 transition font-semibold";
            }
            processAndRender(allVideosMaster);
            if (isMobileViewport()) closeSidebar();
        }

        function handleSliderChange(val) {
            const label = document.getElementById('duration-label');
            const minutes = parseInt(val, 10);
            
            if (minutes === 0) {
                maxDurationMinutes = 0;
                label.innerText = 'すべて表示';
            } else if (minutes === 95) {
                maxDurationMinutes = 90; 
                label.innerText = '90分以上のみ';
            } else {
                maxDurationMinutes = minutes;
                label.innerText = `${minutes}分以内`;
            }
            processAndRender(allVideosMaster);
        }

        function processAndRender(videos) {
            clearAllGrids();

            const now = new Date();
            const oneDayAgo = new Date(now.getTime() - 24 * 60 * 60 * 1000);
            const threeDaysAgo = new Date(now.getTime() - 3 * 24 * 60 * 60 * 1000);
            
            const pinnedIds = new Set(JSON.parse(localStorage.getItem('pinned_video_ids') || '[]'));

            // ─── 特化フィルター選択中は、そのフィルター専用チャンネルの動画もプールに合流 ───
            let pool = videos;
            const extraIdSet = new Set();
            if (currentFilter !== 'all') {
                const extraVideos = categoryExtraVideos[currentFilter] || [];
                if (extraVideos.length > 0) {
                    extraVideos.forEach(v => extraIdSet.add(v.id));
                    const extra = extraVideos.filter(v => !videos.some(x => x.id === v.id));
                    pool = videos.concat(extra);
                }
            }

            let filtered = pool.filter(v => 
                v.liveStatus === 'live' || 
                v.liveStatus === 'upcoming' || 
                v.publishedAt >= threeDaysAgo ||
                pinnedIds.has(v.id) ||
                extraIdSet.has(v.id)
            );

            if (currentFilter !== 'all') {
                const keywords = FILTER_KEYWORDS[currentFilter];
                filtered = filtered.filter(v => {
                    if (extraIdSet.has(v.id)) return true; // フィルター専用チャンネルはキーワード判定を免除
                    const titleLower = v.title.toLowerCase();
                    const channelLower = v.channelTitle.toLowerCase();
                    return keywords.some(kw => titleLower.includes(kw) || channelLower.includes(kw));
                });
            }

            if (maxDurationMinutes > 0) {
                filtered = filtered.filter(v => {
                    if (v.liveStatus === 'live' || v.liveStatus === 'upcoming') return true; 
                    const seconds = parseDurationToSeconds(v.duration);
                    const minutes = seconds / 60;
                    if (maxDurationMinutes === 90) {
                        return minutes >= 90; 
                    } else {
                        return minutes <= maxDurationMinutes; 
                    }
                });
            }

            const unviewed = filtered.filter(v => !viewedVideoIds.has(v.id));
            const watched = filtered.filter(v => viewedVideoIds.has(v.id));

            const clicks = JSON.parse(localStorage.getItem('channel_clicks') || '{}');
            const frequentChannels = Object.keys(clicks).filter(title => clicks[title] >= 2);

            const liveList = unviewed.filter(v => v.liveStatus === 'live');
            const upcomingList = unviewed.filter(v => v.liveStatus === 'upcoming').sort((a, b) => {
                if (!a.scheduledStartTime) return 1;
                if (!b.scheduledStartTime) return -1;
                return a.scheduledStartTime - b.scheduledStartTime;
            });

            const pinnedList = unviewed.filter(v => pinnedIds.has(v.id)).sort((a, b) => b.publishedAt - a.publishedAt);
            const normalUnviewed = unviewed.filter(v => v.liveStatus !== 'live' && v.liveStatus !== 'upcoming');

            const shortsList = normalUnviewed.filter(v => isShorts(v.duration)).sort((a, b) => {
                const aFav = frequentChannels.includes(a.channelTitle) ? 1 : 0;
                const bFav = frequentChannels.includes(b.channelTitle) ? 1 : 0;
                if (aFav !== bFav) return bFav - aFav; 
                return b.publishedAt - a.publishedAt; 
            });

            const normalList = normalUnviewed.filter(v => !isShorts(v.duration));
            const frequentList = normalList.filter(v => frequentChannels.includes(v.channelTitle)).sort((a,b)=>b.publishedAt-a.publishedAt);
            const remainingNormal = normalList.filter(v => !frequentChannels.includes(v.channelTitle));

            const todayList = remainingNormal.filter(v => v.publishedAt >= oneDayAgo).sort((a,b)=>b.publishedAt-a.publishedAt);
            const recentList = remainingNormal.filter(v => v.publishedAt < oneDayAgo).sort((a,b)=>b.publishedAt-a.publishedAt);
            const watchedList = watched.sort((a,b)=>b.publishedAt-a.publishedAt);

            renderSection('live', liveList, true, false);
            renderSection('upcoming', upcomingList, false, false);
            renderSection('pinned', pinnedList, false, false);
            renderSection('frequent', frequentList, false, false);
            renderSection('shorts', shortsList, false, false, true);
            renderSection('today', todayList, false, false);
            renderSection('recent', recentList, false, false);
            renderSection('watched', watchedList, false, true);

            // ─── 「まとめて見る」対象セクションの動画リストを保持し、ボタンの表示切り替え ───
            renderedSectionVideos = { pinned: pinnedList, frequent: frequentList, shorts: shortsList, today: todayList, recent: recentList };
            Object.keys(renderedSectionVideos).forEach(prefix => {
                const btn = document.getElementById(`playqueue-${prefix}`);
                if (btn) btn.classList.toggle('hidden', renderedSectionVideos[prefix].length < 2);
            });

            const emptyMessage = document.getElementById('empty-message');
            if (emptyMessage) {
                if (filtered.length === 0) {
                    emptyMessage.classList.remove('hidden');
                } else {
                    emptyMessage.classList.add('hidden');
                }
            }
        }

        function renderSection(prefix, list, isLive, isWatched, isShortsGrid = false) {
            const scrollArea = document.getElementById(`${prefix}-scroll`);
            const section = document.getElementById(`${prefix}-section`);
            if (!scrollArea || !section) return;
            if (list.length === 0) { section.classList.add('hidden'); return; }
            section.classList.remove('hidden');
            list.forEach(v => { scrollArea.appendChild(createVideoCard(v, isLive || v.liveStatus === 'live', isWatched, isShortsGrid)); });
        }

        function createVideoCard(video, isLive, isWatched, isShortsGrid) {
            const card = document.createElement('div');
            card.id = `video-${video.id}`;
            const pinnedIds = new Set(JSON.parse(localStorage.getItem('pinned_video_ids') || '[]'));
            const isPinned = pinnedIds.has(video.id);

            if (isShortsGrid) {
                card.className = `video-card bg-zinc-900 rounded-xl overflow-hidden flex flex-col flex-shrink-0 w-[140px] md:w-[165px] border border-zinc-900/60 relative ${isWatched ? 'opacity-25 select-none' : ''}`;
            } else {
                card.className = `video-card bg-zinc-900 rounded-xl overflow-hidden flex flex-col flex-shrink-0 w-[200px] sm:w-[240px] md:w-[280px] border border-zinc-900/60 relative ${isWatched ? 'opacity-25 select-none' : ''}`;
            }
            
            const aspectClass = isShortsGrid ? 'aspect-[9/16]' : 'aspect-video';
            let timeStr = formatTimeAgo(video.publishedAt);
            if (video.liveStatus === 'upcoming') {
                timeStr = `⏰ ${formatStartTime(video.scheduledStartTime)}`;
            } else if (isLive && !isWatched) {
                timeStr = '🔴 LIVE配信中';
            }

            const badgeColor = isLive ? 'bg-red-600 text-white' : (video.liveStatus === 'upcoming' ? 'bg-amber-600 text-white' : (isShortsGrid ? 'bg-zinc-800 text-red-400 border border-zinc-700/50' : 'bg-zinc-800/80 text-zinc-400'));
            const badgeText = isLive ? 'LIVE' : (video.liveStatus === 'upcoming' ? '配信予定' : (isShortsGrid ? 'Shorts' : '動画'));
            const pinBtnClass = isPinned ? 'bg-teal-500 text-zinc-950 font-bold scale-110' : 'bg-black/60 text-zinc-400 hover:text-white hover:bg-black/80';

            card.innerHTML = `
                <div class="block ${aspectClass} overflow-hidden bg-black group relative">
                    ${!isWatched ? `
                        <button onclick="togglePin(event, '${video.id}')" class="absolute top-2 left-2 z-20 p-1.5 rounded-lg text-[10px] transition backdrop-blur-sm ${pinBtnClass}" title="あとで見るキープ">📌</button>
                    ` : ''}
                    <a href="${video.url}" target="_blank" onclick="watchVideo('${video.id}')" class="block w-full h-full">
                        <img src="${video.thumbnail}" alt="${video.title}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                        <span class="absolute bottom-1.5 right-1.5 text-[9px] font-bold px-1.5 py-0.5 rounded ${badgeColor}">${badgeText}</span>
                    </a>
                </div>
                <div class="p-2.5 flex flex-col flex-grow">
                    <h3 class="font-bold text-[11px] line-clamp-2 text-zinc-200 mb-1 leading-snug tracking-wide h-8">${video.title}</h3>
                    <div class="mt-auto text-[10px] text-zinc-500 space-y-0.5">
                        <p class="font-medium text-zinc-400 truncate">${video.channelTitle}</p>
                        <p class="${(isLive || video.liveStatus === 'upcoming') && !isWatched ? 'text-amber-400 font-semibold' : ''}">${timeStr}</p>
                    </div>
                </div>
            `;
            return card;
        }

        function togglePin(event, videoId) {
            event.preventDefault();
            event.stopPropagation();
            let pinnedIds = new Set(JSON.parse(localStorage.getItem('pinned_video_ids') || '[]'));
            if (pinnedIds.has(videoId)) { pinnedIds.delete(videoId); } else { pinnedIds.add(videoId); }
            localStorage.setItem('pinned_video_ids', JSON.stringify([...pinnedIds]));
            processAndRender(allVideosMaster);
        }

        // ─── セクションの動画をまとめてキュー再生（YouTubeの一時プレイリスト機能を利用） ───
        function playSectionQueue(prefix) {
            const list = renderedSectionVideos[prefix] || [];
            const ids = list.filter(v => v.liveStatus !== 'live').map(v => v.id);
            if (ids.length === 0) return;

            // クリックしたのと同様に、視聴済み・学習履歴・ピン解除を一括反映
            const clicks = JSON.parse(localStorage.getItem('channel_clicks') || '{}');
            let pinnedIds = new Set(JSON.parse(localStorage.getItem('pinned_video_ids') || '[]'));
            list.forEach(v => {
                if (v.channelTitle) clicks[v.channelTitle] = (clicks[v.channelTitle] || 0) + 1;
                if (v.liveStatus !== 'live') viewedVideoIds.add(v.id);
                pinnedIds.delete(v.id);
            });
            localStorage.setItem('channel_clicks', JSON.stringify(clicks));
            localStorage.setItem('viewed_video_ids', JSON.stringify([...viewedVideoIds]));
            localStorage.setItem('pinned_video_ids', JSON.stringify([...pinnedIds]));

            const url = ids.length === 1
                ? `https://www.youtube.com/watch?v=${ids[0]}`
                : `https://www.youtube.com/watch_videos?video_ids=${ids.slice(0, 50).join(',')}`;
            window.open(url, '_blank');

            processAndRender(allVideosMaster);
        }

        function watchVideo(videoId) {
            const video = allVideosMaster.find(v => v.id === videoId);
            if (video && video.channelTitle) {
                let clicks = JSON.parse(localStorage.getItem('channel_clicks') || '{}');
                clicks[video.channelTitle] = (clicks[video.channelTitle] || 0) + 1;
                localStorage.setItem('channel_clicks', JSON.stringify(clicks));
            }
            if (video && video.liveStatus === 'live') return;

            let pinnedIds = new Set(JSON.parse(localStorage.getItem('pinned_video_ids') || '[]'));
            if (pinnedIds.has(videoId)) {
                pinnedIds.delete(videoId);
                localStorage.setItem('pinned_video_ids', JSON.stringify([...pinnedIds]));
            }

            if (viewedVideoIds.has(videoId)) return;
            viewedVideoIds.add(videoId);
            localStorage.setItem('viewed_video_ids', JSON.stringify([...viewedVideoIds]));
            
            const card = document.getElementById(`video-${videoId}`);
            if (card) {
                card.style.opacity = '0';
                card.style.transform = 'scale(0.95)';
                setTimeout(() => { 
                    processAndRender(allVideosMaster); 
                }, 250);
            }
        }

        function filterVideos() {
            const query = document.getElementById('filter-search').value.toLowerCase();
            if (!query) { processAndRender(allVideosMaster); return; }
            const filtered = allVideosMaster.filter(video => {
                return video.title.toLowerCase().includes(query) || video.channelTitle.toLowerCase().includes(query);
            });
            processAndRender(filtered);
        }

        function clearAllGrids() {
            ['live', 'upcoming', 'pinned', 'frequent', 'shorts', 'today', 'recent', 'watched'].forEach(p => {
                const scrollArea = document.getElementById(`${p}-scroll`);
                if(scrollArea) scrollArea.innerHTML = '';
                const sec = document.getElementById(`${p}-section`);
                if(sec) sec.classList.add('hidden');
            });
        }

        function resetViewedList() {
            if (confirm('すべての動画を未視聴の状態に戻しますか？')) {
                localStorage.removeItem('viewed_video_ids');
                viewedVideoIds.clear();
                processAndRender(allVideosMaster);
            }
        }
        function resetPinnedList() {
            if (confirm('「あとで見るキープ」のピン留めをすべて一括解除しますか？')) {
                localStorage.removeItem('pinned_video_ids');
                processAndRender(allVideosMaster);
            }
        }
        function resetClicksList() {
            if (confirm('チャンネルの学習履歴をすべてリセットしますか？')) {
                localStorage.removeItem('channel_clicks');
                processAndRender(allVideosMaster);
            }
        }

        function formatTimeAgo(date) {
            const diffMs = new Date() - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHours / 24);
            if (diffMins < 60) return `${diffMins}分前`;
            if (diffHours < 24) return `${diffHours}時間前`;
            return `${diffDays}日前`;
        }

        function formatStartTime(date) {
            if (!date) return '開始時間未定';
            const now = new Date();
            const diffMs = date - now;
            if (diffMs < 0) return 'まもなく開始 / 遅延中';
            const diffMins = Math.floor(diffMs / 60000);
            if (diffMins < 60) return `あと ${diffMins} 分で開始`;
            const diffHours = Math.floor(diffMins / 60);
            if (diffHours < 24) return `あと ${diffHours} 時間で開始`;
            const m = date.getMonth() + 1;
            const d = date.getDate();
            const h = String(date.getHours()).padStart(2, '0');
            const i = String(date.getMinutes()).padStart(2, '0');
            return `${m}/${d} ${h}:${i} 〜`;
        }
    </script>
</body>
</html>
