<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>CUSTOM FEED v8.5</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div id="status" class="p-4 text-zinc-400">初期化中...</div>
    <div id="content" class="p-4"></div>

    <script>
        const CLIENT_ID = '617132904694-v3buugv4jh6pjp9bntcn08q8ekl8ciu5.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/youtube.readonly';
        
        // デバッグ用ログ出力関数
        function log(msg) { console.log(`[DEBUG]: ${msg}`); }

        let accessToken = null;
        let mySubscribedChannels = [];

        function initTokenClient() {
            window.tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (res) => {
                    if (res.access_token) {
                        accessToken = res.access_token;
                        startApp();
                    }
                }
            });
        }

        window.onload = () => {
            initTokenClient();
            document.getElementById('content').innerHTML = `<button onclick="window.tokenClient.requestAccessToken()" class="bg-blue-600 p-4 rounded">連携開始</button>`;
            document.getElementById('status').innerText = '準備完了';
        };

        async function startApp() {
            log('アプリ開始');
            try {
                // 1. 登録チャンネル取得
                const subRes = await fetch(`https://www.googleapis.com/youtube/v3/subscriptions?part=snippet&mine=true&maxResults=50`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const subData = await subRes.json();
                if (!subData.items) throw new Error('チャンネル取得失敗');
                
                mySubscribedChannels = subData.items.map(i => i.snippet?.title?.toLowerCase() || '').filter(Boolean);
                log(`登録チャンネル数: ${mySubscribedChannels.length}`);

                // 2. 隠し切り抜き巡回（完全に独立した関数にする）
                await fetchHiddenKirinuki();
                
            } catch (e) {
                console.error(e);
                document.getElementById('status').innerText = `エラー発生: ${e.message}`;
            }
        }

        async function fetchHiddenKirinuki() {
            log('切り抜き巡回開始');
            const IDs = ['UCoM5tr4Uf8qYDe48IOyMLNw', 'UCZ_Gm9ipdFovmM8Pf9f-_Ww']; // テスト用に2つに削減
            
            for (const chId of IDs) {
                try {
                    const pid = 'UU' + chId.substring(2);
                    const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${pid}&maxResults=3`;
                    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                    const data = await res.json();
                    
                    if (!data.items) continue;

                    data.items.forEach(item => {
                        const title = item.snippet?.title?.toLowerCase() || '';
                        // 判定ロジック
                        const isMatch = mySubscribedChannels.some(name => title.includes(name)) || title.includes('ぶいすぽ');
                        if (isMatch) {
                            log(`ヒット！: ${title}`);
                        }
                    });
                } catch (e) {
                    log(`チャンネル ${chId} の巡回でエラー: ${e.message}`);
                }
            }
            log('切り抜き巡回完了');
        }
    </script>
</body>
</html>
